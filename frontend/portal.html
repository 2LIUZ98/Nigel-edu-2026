<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Welcome | Nigel</title>
    <link rel="stylesheet" href="../css/main.css">

<style>
    .portal-wrap{
        min-height: calc(100vh - 72px);
        display: grid;
        place-items: center;
        padding: 32px;
    }
    .portal-inner{
        width: min(1100px, 100%);
        text-align: center;
    }
    .portal-title{
        font-size: clamp(34px, 4vw, 56px);
        margin: 0 0 28px;
        letter-spacing: -0.02em;
    }
    .portal-grid{
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
        align-items: stretch;
    }
    @media (max-width: 820px){
        .portal-grid{grid-template-columns: 1fr;}
    }
    .portal-card{
        border-radius: 18px;
        padding: 22px;
        background: #f7f7f9;
        border: 1px solid rgba(0, 0, 0, 0.06);
        display: grid;
        gap: 16px;
        min-height: 220px;
        position: relative;
        overflow: hidden;
    }
    .portal-card .label{
        font-size: 18px;
        font-weight: 700;
        margin: 0;
        text-align: left;
    }
    .portal-card .sub{
        margin: 0;
        opacity: 0.75;
        text-align: left;
        max-width: 38ch;
    }
    .portal-btn{
        justify-self: start;
        display: inline-flex;
        align-items: center;
        gap: 12px;
        border: 0;
        border-radius: 12px;
        padding: 14px 16px;
        color: #fff;
        font-weight: 700;
        cursor: pointer;
        text-decoration: none;
    }
    .portal-btn .icon{
        width: 34px;
        height: 34px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.18);
        display: grid;
        place-items: center;
        font-size: 18px;
        line-height: 1;
    }
    .portal-student .portal-btn{background: #d80b1f;}
    .portal-teacher .portal-btn{background: #2f78d6;}
    .portal-visual{
        position: absolute;
        inset: 0;
        opacity: 0.15;
        background: radial-gradient(circle at 30% 20%, rgba(0,0,0,0.35), transparent 55%),
        radial-gradient(circle at 80% 70%, rgba(0,0,0,0.25), transparent 60%);
        pointer-events: none;
    }
    .portal-card:hover{border-color: rgba(0,0,0,0.12);}
</style>
</head>
<body>
 <div class="app">
    <header class="topbar">
    <div class="topbar-inner">
    <div class="brand">
    <div class="brand-mark"></div>
    <div>nigel</div>
    </div>
    </div>
    </header>
    <main class="portal-wrap">
    <div class="portal-inner">
    <h1 class="portal-title">Choose your portal</h1>
    <section class="portal-grid" aria-label="Portal selection">
    <article class="portal-card portal-student">
    <div class="portal-visual" aria-hidden="true"></div>
    <h2 class="label">Students</h2>
    <p class="sub">Log in to access lessons, quizzes, and your progress.</p>
    <a class="portal-btn" href="login-student.html">
        <span class="icon">›</span>
        <span>Student portal</span>
    </a>
    </article>
    <article class="portal-card portal-teacher">
    <div class="portal-visual" aria-hidden="true"></div>
    <h2 class="label">Staff</h2>
    <p class="sub">Teacher and parent access. Manage students and generates codes.</p>
    <a class="portal-btn" href="login-staff.html">
        <span class="icon">›</span>
        <span>Staff portal</span>
    </a>
    </article>
    </section>
    </div>
    </main>
 </div>   
</body>
</html>
