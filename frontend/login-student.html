<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Student Login | Nigel</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/login-student.css">


</head>
<body>
    <div class="app">
        <header class="topbar">
        <div class="topbar-inner">
        <div class="brand">
        <div class="brand-mark"></div>
        <div>nigel</div>
        </div>
        </div>
        </header>
        <main class="auth-wrap">
            <div class="auth-card">
                <h1>Student login</h1>
                <p class="muted">Log in to view your lessons, quizzes, and progress.</p>
                <form id="loginStudentForm" novalidate>
                    <label class="field">
                        <span>Username</span>
                        <input id="username" type="text" autocomplete="username" required />
                    </label>
                    <label class="field">
                    <span>Password</span>
                    <input id="password" type="password" autocomplete="current-password" required />
                    </label>
                    <button class="btn btn-primary" type="submit">Log in</button>
                    <p id="msg" class="msg" aria-live="polite"></p>
                    <div class="links">
                        <a href="portal.html">Back</a>
                        <a href="signup.html">Create an account</a>
                    </div>
                </form>
            </div>
        </main>
    </div>
    <script src="../js/config.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
    const form = document.getElementById("loginStudentForm");
    const msg = document.getElementById("msg");

    form.addEventListener("submit", async (e) => {
        e.preventDefault();
        msg.textContent = "";
        msg.className = "msg";

        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();

        if (!username || !password) {
            msg.textContent = "Please enter your username and password.";
            msg.className = "msg err";
            return;
        }

        try {
            //const response = await fetch("http://localhost:3000/login/student", {
            const response = await fetch(`${BASE_URL}/login/student`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ username, password })
            });

            let data = {};
            try {
                data = await response.json();
            } catch {
                data = {};
            }

            if (!response.ok) {
                msg.textContent = data.message || "Login failed.";
                msg.className = "msg err";
                return;
            }

            localStorage.setItem("nigel_session", JSON.stringify({
                userId: data.user.id,
                studentId: data.user.student_id,
                role: data.user.role,
                username: data.user.username,
                first_name: data.user.first_name || "",
                last_name: data.user.last_name || ""
            }));

            msg.textContent = "Logged in. Redirecting...";
            msg.className = "msg ok";

            setTimeout(() => {
                window.location.href = "student-dashboard.html";
            }, 500);

        } catch (error) {
            msg.textContent = "Server not reachable.";
            msg.className = "msg err";
            console.error(error);
        }
    });
});

</script>
</body>
</html>
