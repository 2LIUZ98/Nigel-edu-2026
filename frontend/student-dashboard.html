<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard | Nigel</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/dashboard.css">
</head>

<body class="page-dashboard">
    <div class="app">
        <header class="topbar">
            <div class="topbar-inner">
            <a class="brand" href="index.html">
                <div class="brand-mark"></div>
                <div>nigel</div>
            </a>
            <div></div>
    
            
        <div class="search" role="search">
            <input id="askNigel" type="text" placeholder="ask Nigel..." />
        </div>
        <div class="topbar-right" style="position: relative; z-index: 2000;">
            <div id="notifWrap" style="position: relative; display: inline-block;">
                <button
                    class="icon-btn"
                    id="notifBtn"
                    aria-label="Notifications"
                    type="button"
                    style="position: relative; z-index: 2002;"
                >🔔</button>

                <span id="notifBadge" style="
                    display:none;
                    position:absolute;
                    top:-6px;
                    right:-6px;
                    min-width:18px;
                    height:18px;
                    border-radius:999px;
                    background:red;
                    color:white;
                    font-size:12px;
                    line-height:18px;
                    text-align:center;
                    font-weight:700;
                    padding:0 5px;
                    z-index:2003;
                    pointer-events:none;
                ">0</span>

                <div id="notifPanel" style="
                    display:none;
                    position:absolute;
                    right:0;
                    top:42px;
                    width:320px;
                    max-height:300px;
                    overflow:auto;
                    background:white;
                    border:1px solid rgba(0,0,0,0.12);
                    border-radius:12px;
                    padding:12px;
                    box-shadow:0 10px 30px rgba(0,0,0,0.12);
                    z-index:2001;
                ">
                    <h3 style="margin:0 0 10px;">Notifications</h3>
                    <div id="notifList">No notifications</div>
                </div>
            </div>

            <a class="btn" href="portal.html">Login</a>
        </div>
        </div>
    
        <nav class="site-nav">
            <ul class="site-menu">
                <li>
                    <a class="active" href="index.html">Home</a>
    
                </li>
                <li class="has-drop">
                    <a href="modules.html">Modules</a>
                    <ul class="drop">
                        <li><a href="lesson.html?module=budgeting">Budgeting</a>
                          <li><a href="lesson.html?module=needs-wants">Needs vs Wants</a></li> 
                          <li><a href="lesson.html?module=scams">Scams</a></li> 
                        </li>
                    </ul>
                </li>
                <li>
                    <a href="student-dashboard.html">Dashboard</a>
                </li>
                <li>
                    <a href="progress.html">Progress</a>
                </li>
            </ul>
        </nav>
    </header>

<main class="container">
    <h1 class="h1">Welcome back</h1>
    <p class="sub" id="studentGreeting"></p>

    <section class="card">
        <div class="card-row">
        <div>
        <div class="badge">Today's task</div>

        <p style="margin: 10px 0 0; font-size: 14px; color: var(--text);">
            Budgeting basics
        </p>

        <p style="margin: 6px 0 0; font-size: 13px; color: var(--muted);">
            Learn how to split money into needs, wants, and savings.
        </p>
        </div>

        <a class="btn" href="modules.html">Start</a>

        </div>
    </section>

    <section class="card">
        <div class="card-row">
            <div>
                <div class="badge">Progress</div>
    
                <p style="margin-top: 10px;">
                    Completed modules:
                    <strong id="progressCount">0</strong>
                </p>
            </div>
        </div>
    </section>

</main>

</div>
<script src="../js/config.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/notification.js"></script>
