<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Staff Login | Nigel</title>
    <link rel="stylesheet" href="../css/main.css">
<style>
        .auth-wrap{
        min-height: calc(100vh - 72px);
        display: grid;
        place-items: center;
        padding: 32px 16px;
    }
    .auth-card{
        width: min(520px, 100%);
        border-radius: 18px;
        padding: 22px;
        background: #f7f7f9;
        border: 1px solid rgba(0,0,0,0.06);
        text-align: left;
    }
    .auth-card h1{
        margin: 0 0 8px;
        font-size: 28px;
        letter-spacing: -0.02em;
    }
    .muted{opacity: 0.75; margin: 0 0 18px;}
    .field{display: grid; gap: 8px; margin-bottom: 14px;}
    .field span{font-weight: 700; font-size: 14px;}
    .field input{
        width: 100%;
        padding: 12px 12px;
        border-radius: 12px;
        border: 1px solid rgba(0, 0, 0, 0.12);
        background: #fff;
        outline: none;
    }
    .row{
        display: flex;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
        margin-top: 8px;
    }
    .btn{
     display: inline-flex;
     align-items: center;
     justify-content: center;
     gap: 10px;
     border: 0;
     border-radius: 12px;
     padding: 12px 14px;
     color: #fff;
     font-weight: 800;
     cursor: pointer;
     text-decoration: none;
     background: #2f78d6;
     width: 100%;
    }
    .msg{margin-top: 12px; font-weight: 700;}
    .msg.err{ color: #b00020;}
    .msg.ok{color: #0b6b2f;}
    .links{
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin-top: 12px;
        font-size: 14px;
        opacity: 0.85;
    }
    .links a{text-decoration: none;}
    </style>
    </head>
    <body>
      <div class="app">
        <header class="topbar">
        <div class="topbar-inner">
        <div class="brand">
        <div class="brand-mark"></div>
        <div>nigel</div>
        </div>
        </div>
        </header>
        <main class="auth-wrap">
        <div class="auth-card">
        <h1>Staff login</h1>
        <p class="muted">Teacher and parent access for managing students and generating codes.</p>
        <form id="loginStaffForm" novalidate>
            <label class="field">
                <span>Username</span>
                <input id="username" type="text" autocomplete="username" required />
            </label>
            <label class="field">
                <span>Password</span>
                <input id="password" type="password" autocomplete="current-password" required />
            </label>
            <button class="btn" type="submit">Log in</button>
            <p id="msg" class="msg" aria-live="polite"></p>
            <div class="links">
                <a href="portal.html">Back</a>
                <a href="signup.html">Create an account</a>
            </div>
        </form>
        </div>
        </main>
      </div>
      <script>
document.addEventListener("DOMContentLoaded", () => {
    const form = document.getElementById("loginStaffForm");
    const msg = document.getElementById("msg");

    form.addEventListener("submit", async (e) => {
        e.preventDefault();
        msg.textContent = "";
        msg.className = "msg";

        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();

        if (!username || !password) {
            msg.textContent = "Please enter your username and password.";
            msg.className = "msg err";
            return;
        }

        try {
            const response = await fetch("http://localhost:3000/login/staff", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ username, password })
            });

            let data = {};
            try {
                data = await response.json();
            } catch {
                data = {};
            }

            if (!response.ok) {
                msg.textContent = data.message || "Login failed.";
                msg.className = "msg err";
                return;
            }

            localStorage.setItem("nigel_session", JSON.stringify({
                userId: data.user.id,
                role: data.user.role,
                username: data.user.username,
                first_name: data.user.first_name || "",
                last_name: data.user.last_name || ""
            }));

            msg.textContent = "Logged in. Redirecting...";
            msg.className = "msg ok";

            setTimeout(() => {
                window.location.href = "staff-dashboard.html";
            }, 500);

        } catch (error) {
            msg.textContent = "Server not reachable.";
            msg.className = "msg err";
            console.error(error);
        }
    });
});
</script>
    </body>
</html>
