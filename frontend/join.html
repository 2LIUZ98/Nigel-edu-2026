                <div class="brand-mark"></div>
                <div>nigel</div>
            </a>
            <div></div>
    
            
        <div class="search" role="search">
            <input id="askNigel" type="text" placeholder="ask Nigel..." />
        </div>
        <div class="topbar-right">
            <button class="icon-btn" aria-label="Notifications">🔔</button>
            <a class="btn" href="portal.html">Login</a>
        </div>
        </div>
    
        <nav class="site-nav">
            <ul class="site-menu">
                <li>
                    <a class="active" href="index.html">Home</a>
    
                </li>
                <li class="has-drop">
                    <a href="modules.html">Modules</a>
                    <ul class="drop">
                        <li><a href="lesson.html?module=budgeting">Budgeting</a>
                          <li><a href="lesson.html?module=needs-wants">Needs vs Wants</a></li>

    </header>
<main class="container">
    <h1 class="h1">Join to learn finance budgeting </h1>
    <p class="sub">Enter your name and invite code to get started.</p>
    <section class="card">
        <form id="joinForm">
            <label class="sub" for="studentName">Your name</label>
            <input 
            type="text"
            id="studentName"
            placeholder="e.g. Alex"
            required
            style="width:100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 14px;"
            />

            <label class="sub" for="inviteCode">invite code</label>
            <input 
            type="text"
            id="inviteCode"
            placeholder="e.g. NGL-204"
            required
            style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 18px;"
            />

            <button type="submit" class="btn" style="width: 100%">
                Join 
            </button>
            <p id="msg" class="msg" style="margin-top: 12px;" aria-live="polite"></p>
        </form>
    </section>
</main>
</div>
<script src="../js/auth.js"></script>
<script src="../js/join.js"></script>
</body>
