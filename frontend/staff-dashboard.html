<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Welcome | Nigel</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/staff-dashboard.css">

</head>
<body>
<div class="app">
<header class="topbar">
<div class="topbar-inner">
<div class="brand">
<div class="brand-mark"></div>
<div>nigel</div>
</div>
</div>
</header>
<main class="page-wrap">
<section class="panel">
<div class="top">
<div>
    <h1>Staff dashboard</h1>
    <p class="muted" id="welcomeLine">Manage students and generate access codes.</p>
</div>
<div class="actions">
    <a class="btn primary" href="portal.html">Portal</a>
    <button class="btn primary" id="logoutBtn" type="button">Log out</button>
</div>
</div>
<div class="grid">
    <div class="card">
        <h2>Generate a code</h2>

        <label class="field">
            <span>Select a module</span>
            <select id="moduleSelect">
                <option value="">Choose a module</option>
                <option value="1">Budgeting</option>
                <option value="2">Needs vs Wants</option>
                <option value="3">Scams</option>
            </select>
        </label>
        <label class="field">
            <span>Select a student</span>
            <select id="studentSelect"></select>
        </label>

        <button class="btn primary" id="genBtn" type="button">Generate code</button>
        <div class="code-box" aria-live="polite">
        <div>
        <div class="meta">Latest code</div>
        <div class="code" id="codeOut">—</div>
        </div>
        <button class="btn primary" id="copyBtn" type="button">Copy</button>
        </div>
        <p class="hint">Codes are stored in the Nigel database.</p>
        <p id="msg" class="msg"></p>
    </div>
    <div class="card">
        <h2>Recent codes</h2>
        <ul class="list" id="recentList"></ul>
        <p class="hint">Shows the most recent codes created on this device.</p>
    </div>
</div>
</section>
</main>
</div>

<script src="../js/auth.js"></script>

<script>
    const readJSON = (k, fallback) => {
      try {
        const raw = localStorage.getItem(k);
        return raw ? JSON.parse(raw) : fallback;
      } catch {
        return fallback;
      }
    };

    const writeJSON = (k, v) => localStorage.setItem(k, JSON.stringify(v));

    const makeCode = (len = 6) => {
      const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
      let out = "";
      for (let i = 0; i < len; i++) out += chars[Math.floor(Math.random() * chars.length)];
      return out;
    };

    const fmtTime = (iso) => {
      try {
        const d = new Date(iso);
        return d.toLocaleString(undefined, {
          year: "numeric",
          month: "short",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit"
        });
      } catch {
        return iso;
      }
    };

    document.addEventListener("DOMContentLoaded", async () => {
      const me = requireStaffOrRedirect();
      if (!me) return;

      const welcomeLine = document.getElementById("welcomeLine");
      const logoutBtn = document.getElementById("logoutBtn");

      const studentSelect = document.getElementById("studentSelect");
      const genBtn = document.getElementById("genBtn");
      const codeOut = document.getElementById("codeOut");
      const copyBtn = document.getElementById("copyBtn");
      const recentList = document.getElementById("recentList");
      const msg = document.getElementById("msg");

      let students = [];

      welcomeLine.textContent = `Logged in as ${me.firstName || ""} ${me.lastName || ""} (${me.role})`.trim();

      const showMsg = (text, ok = false) => {
        msg.textContent = text || "";
        msg.className = ok ? "msg ok" : "msg err";
        if (!text) msg.className = "msg";
      };

      const renderRecent = () => {
        const codes = readJSON("nigel_codes", []).slice().reverse().slice(0, 6);

        if (!codes.length) {
          recentList.innerHTML = `<li><span class="who">No codes yet</span><span class="meta">Generate one to see it here</span></li>`;
          return;
        }

        const byId = Object.fromEntries(students.map(s => [String(s.student_id), s]));

        recentList.innerHTML = codes.map(c => {
          const who =
            c.studentId === "all"
              ? "All students"
              : (byId[String(c.studentId)]?.full_name || "Unknown student");

          return `
            <li>
              <div>
                <div class="who">${who}</div>
                <div class="meta">${fmtTime(c.createdAt)}</div>
              </div>
              <div class="who">${c.code}</div>
            </li>
          `;
        }).join("");
      };

      try {
        const response = await fetch("http://localhost:3000/students");
        students = await response.json();

        if (!response.ok) {
          throw new Error("Could not load students");
        }

        if (!students.length) {
          studentSelect.innerHTML = `<option value="">No students found (create a student account first)</option>`;
          genBtn.disabled = true;
        } else {
          studentSelect.innerHTML = `
            <option value="all">Select all students</option>
            ${students
              .map(s => `<option value="${s.student_id}">${s.full_name} (${s.username})</option>`)
              .join("")}
          `;
          genBtn.disabled = false;
        }
      } catch (error) {
        console.error(error);
        studentSelect.innerHTML = `<option value="">Could not load students</option>`;
        genBtn.disabled = true;
        showMsg("Could not load students.");
      }

        genBtn.addEventListener("click", async () => {
        showMsg("");

        const studentId = studentSelect.value;
        const moduleId = document.getElementById("moduleSelect").value;

        if (!moduleId) {
          showMsg("Please select a module.");
          return;
        }

        if (!studentId) {
          showMsg("Please select a student.");
          return;
        }

        try {
          const response = await fetch("http://localhost:3000/invitation-codes", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              module_id: moduleId,
              student_id: studentId,
              created_by_user_id: me.id
            })
          });

          let data = {};
          try {
            data = await response.json();
          } catch {
            data = {};
          }

          if (!response.ok) {
            showMsg(data.message || "Could not create code.");
            return;
          }

          codeOut.textContent = data.code || "—";
          showMsg(data.message || "Code created.", true);
        } catch (error) {
          console.error(error);
          showMsg("Server not reachable.");
        }
      });

      copyBtn.addEventListener("click", async () => {
        const text = String(codeOut.textContent || "").trim();
        if (!text || text === "—") {
          showMsg("Nothing to copy yet.");
          return;
        }

        try {
          await navigator.clipboard.writeText(text);
          showMsg("Copied to clipboard.", true);
        } catch {
          showMsg("Could not copy. Select the code and copy manually.");
        }
      });

      logoutBtn.addEventListener("click", () => {
        clearSession();
        window.location.href = "portal.html";
      });

      renderRecent();
    });
</script>
</body>
</html>
