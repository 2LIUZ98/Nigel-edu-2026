<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Create account | Nigel</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/signup.css">

</head>
<body>
<div class="app">
    <header class="topbar">
        <div class="topbar-inner">
        <div class="brand">
        <div class="brand-mark"></div>
        <div>nigel</div>
        </div>
        </div>
    </header>
    <main class="auth-wrap">
    <div class="auth-card">
      <h1>Create account</h1>
      <p class="muted">Choose a role and create an account to continue.</p>
      <form id="signupForm" novalidate>
        <label class="field">
            <span>Role</span>
            <select id="role" required>
                <option value="student">Student</option>
                <option value="parent">Parent</option>
                <option value="teacher">Teacher</option>
            </select>
        </label>
        <div class="row">
            <label class="field">
                <span>First name</span>
                <input id="firstName" type="text" autocomplete="given-name" required/>
            </label>
            <label class="field">
                <span>Last name</span>
                <input id="lastName" type="text" autocomplete="family-name" required />
            </label>
        </div>
        <label class="field">
        <span>Username</span>
        <input id="username" type="text" autocomplete="username" required />
        </label>

        <label class="field">
          <span>Password</span>
          <input id="password" type="password" minlength="8" autocomplete="new-password" required />  
        </label>
        <button class="btn btn-primary" type="submit">Create account</button>
        <p id="msg" class="msg" aria-live="polite"></p>
        <div class="links">
            <a href="portal.html">Back</a>
            <a href="login-student.html">Student login</a>
        </div>
      </form>  
    </div>
    </main>
    <script>
    document.addEventListener("DOMContentLoaded", () => {
    const form = document.getElementById("signupForm");
    const msg = document.getElementById("msg");

    const setMsg = (text, ok = false) => {
        msg.textContent = text || "";
        msg.className = ok ? "msg ok" : "msg err";
        if (!text) msg.className = "msg";
    };

    form.addEventListener("submit", async (e) => {
        e.preventDefault();
        setMsg("");

        const role = document.getElementById("role").value;
        const firstName = String(document.getElementById("firstName").value || "").trim();
        const lastName = String(document.getElementById("lastName").value || "").trim();
        const username = String(document.getElementById("username").value || "").trim();
        const password = String(document.getElementById("password").value || "");

        if (!role || !firstName || !lastName || !username || !password) {
            setMsg("Please fill in all fields.");
            return;
        }

        if (password.length < 8) {
            setMsg("Password must be at least 8 characters.");
            return;
        }

        const full_name = `${firstName} ${lastName}`.trim();

        try {
            const response = await fetch("http://localhost:3000/register", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    username,
                    password,
                    role,
                    full_name,
                    first_name: firstName,
                    last_name: lastName
                })
            });

            let data = {};
            try {
                data = await response.json();
            } catch {
                data = {};
            }

            if (!response.ok) {
                setMsg(data.message || "Registration failed.");
                return;
            }

            setMsg("Account created. Redirecting...", true);

            setTimeout(() => {
                window.location.href = role === "student"
                    ? "login-student.html"
                    : "login-staff.html";
            }, 500);

        } catch (error) {
            setMsg("Server not reachable.");
            console.error(error);
        }
    });
});
</script>
</div>
</body>
