<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Create account | Nigel</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/signup.css">

</head>
<body>
<div class="app">
    <header class="topbar">
        <div class="topbar-inner">
        <div class="brand">
        <div class="brand-mark"></div>
        <div>nigel</div>
        </div>
        </div>
    </header>
    <main class="auth-wrap">
    <div class="auth-card">
      <h1>Create account</h1>
      <p class="muted">Choose a role and create an account to continue.</p>
      <form id="signupForm" novalidate>
        <label class="field">
            <span>Role</span>
            <select id="role" required>
                <option value="student">Student</option>
                <option value="parent">Parent</option>
                <option value="teacher">Teacher</option>
            </select>
        </label>
        <label class="field" id="childField" style="display:none;">
            <span>Child username</span>
            <input id="childUsername" type="text" placeholder="Enter child's username"/>
        </label>
        
        <div class="row">
            <label class="field">
                <span>First name</span>
                <input id="firstName" type="text" autocomplete="given-name" required/>
            </label>
            <label class="field">
                <span>Last name</span>
                <input id="lastName" type="text" autocomplete="family-name" required />
            </label>
        </div>
        <label class="field">
        <span>Username</span>
        <input id="username" type="text" autocomplete="username" required />
        </label>

        <label class="field">
          <span>Password</span>
          <input id="password" type="password" minlength="8" autocomplete="new-password" required />  
        </label>
        <button class="btn btn-primary" type="submit">Create account</button>
        <p id="msg" class="msg" aria-live="polite"></p>
        <div class="links">
            <a href="portal.html">Back</a>
            <a href="login-student.html">Student login</a>
        </div>
      </form>  
    </div>
    </main>
</div>
<script src="../js/config.js"></script>
<script src="../js/signup.js"></script>
</body>
</html>
